name: Linux Release
permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
      - name: Build Frontend
        env:
          CI: ""
        run: |
          cd web
          yarn install
          VITE_APP_VERSION=$(git describe --tags) yarn run build
          cd ..
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Download Go modules
        run: go mod download
      - name: Build release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-build release-artifacts
          go build -trimpath -ldflags "-s -w -X 'one-api/common/config.Version=$(git describe --tags)'" -o release-build/tokilake-linux-amd64 .

          ./hack/scripts/package-release.sh tokilake "$VERSION" linux amd64 release-build/tokilake-linux-amd64 release-artifacts
          ./hack/scripts/write-sha256sums.sh \
            release-artifacts/SHA256SUMS-linux.txt \
            release-artifacts/tokilake_"$VERSION"_linux_amd64.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GT_Token }}
