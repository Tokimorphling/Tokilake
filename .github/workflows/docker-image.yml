name: Container Images

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
      - "README.en.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: tokilake
            docker_target: tokilake
            image_name: tokilake
          - app: tokiame
            docker_target: tokiame
            image_name: tokiame
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Compute image metadata inputs
        id: prep
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_image=ghcr.io/${owner}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.DOCKER_HUB_USERNAME }}" ]; then
            echo "dockerhub_image=docker.io/${{ vars.DOCKER_HUB_USERNAME }}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "app_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKER_HUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.ghcr_image }}
            ${{ steps.prep.outputs.dockerhub_image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.docker_target }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.prep.outputs.app_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
