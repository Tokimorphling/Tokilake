name: macOS Release
permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
      - name: Build Frontend
        env:
          CI: ""
        run: |
          cd web
          yarn install
          VITE_APP_VERSION=$(git describe --tags) yarn run build
          cd ..
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Build release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-build release-artifacts
          go mod download
          ARCH=$(go env GOARCH)
          go build -trimpath -ldflags "-s -w -X 'one-api/common/config.Version=$(git describe --tags)'" -o release-build/tokilake-darwin-$ARCH .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w -X 'one-api/common/config.Version=$(git describe --tags)'" -o release-build/tokiame-darwin-amd64 ./cmd/tokiame
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X 'one-api/common/config.Version=$(git describe --tags)'" -o release-build/tokiame-darwin-arm64 ./cmd/tokiame

          ./hack/scripts/package-release.sh tokilake "$VERSION" darwin "$ARCH" release-build/tokilake-darwin-$ARCH release-artifacts
          ./hack/scripts/package-release.sh tokiame "$VERSION" darwin amd64 release-build/tokiame-darwin-amd64 release-artifacts
          ./hack/scripts/package-release.sh tokiame "$VERSION" darwin arm64 release-build/tokiame-darwin-arm64 release-artifacts
          ./hack/scripts/write-sha256sums.sh \
            release-artifacts/SHA256SUMS-darwin.txt \
            release-artifacts/tokilake_"$VERSION"_darwin_"$ARCH".tar.gz \
            release-artifacts/tokiame_"$VERSION"_darwin_amd64.tar.gz \
            release-artifacts/tokiame_"$VERSION"_darwin_arm64.tar.gz
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GT_Token }}
