services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${POSTGRES_DB:-tokilake}
      POSTGRES_USER: ${POSTGRES_USER:-tokilake}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokilake} -d ${POSTGRES_DB:-tokilake}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  tokilake:
    image: ${TOKILAKE_IMAGE:-ghcr.io/tokimorphling/tokilake:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/config/config.yaml:/data/config.yaml:ro"
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/data:/data"
    expose:
      - "19981"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      tokilake:
        condition: service_started
    environment:
      TOKILAKE_SERVER_NAME: ${TOKILAKE_SERVER_NAME}
      TOKILAKE_UPSTREAM: ${TOKILAKE_UPSTREAM:-http://tokilake:19981}
    command:
      - /bin/sh
      - -c
      - |
        (
          while :; do
            sleep 6h & wait $${!}
            nginx -s reload || true
          done
        ) &
        exec nginx -g "daemon off;"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - "${TOKILAKE_NGINX_TEMPLATE:-./nginx.compose.acme.conf.template}:/etc/nginx/templates/default.conf.template:ro"
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/certbot/www:/var/www/certbot"
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/letsencrypt:/etc/letsencrypt"

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 12h & wait $${!}
        done
    volumes:
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/certbot/www:/var/www/certbot"
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/letsencrypt:/etc/letsencrypt"

  certbot:
    image: certbot/certbot:latest
    profiles:
      - manual
    entrypoint:
      - certbot
    volumes:
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/certbot/www:/var/www/certbot"
      - "${TOKILAKE_COMPOSE_ROOT:-./runtime-letsencrypt}/letsencrypt:/etc/letsencrypt"
