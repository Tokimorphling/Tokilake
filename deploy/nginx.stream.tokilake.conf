# This is a plain TCP stream proxy example.
# It is useful when you specifically want nginx stream + PROXY protocol.
# For normal HTTPS websites, prefer deploy/nginx.tokilake.conf instead.
#
# Tokilake requirements for this mode:
# - proxy_protocol_enabled: true
# - trusted_proxies must include the nginx source IP / CIDR seen by Tokilake

stream {
    upstream tokilake_backend {
        server 127.0.0.1:19981;
    }

    server {
        listen 29981;
        proxy_pass tokilake_backend;
        proxy_protocol on;
    }
}
