# Docker Compose template for:
# - tokilake + nginx + postgres + redis
# - tokilake only reachable on the internal compose network
# - nginx published on HTTP port 80 by default

port: 19981
gin_mode: "release"
log_level: "info"
log_dir: "./logs"

# Update this to your real external address.
# If TLS terminates elsewhere, set it to the external HTTPS URL.
server_address: "http://api.example.com"

trusted_header: ""

# nginx runs in another container, so trust internal Docker network ranges.
trusted_proxies:
  - "172.16.0.0/12"
  - "10.0.0.0/8"
  - "192.168.0.0/16"

proxy_protocol_enabled: false

session_secret: "replace-with-a-random-session-secret"
user_token_secret: "replace-with-at-least-32-random-characters"
# Optional: custom sqids alphabet for user tokens.
# Leave empty unless you intentionally need a custom alphabet with unique characters only.
hashids_salt: ""

sql_dsn: "postgres://tokilake:replace-with-db-password@postgres:5432/tokilake?sslmode=disable"
sqlite_path: "one-api.db"
redis_conn_string: "redis://redis:6379/0"

register_enabled: true
password_login_enabled: false
password_register_enabled: false
github_oauth_enabled: false
google_oauth_enabled: true
google_only_register_enabled: true
wechat_auth_enabled: false
lark_auth_enabled: false
oidc_auth_enabled: false
webauthn_auth_enabled: false
google_client_id: ""
google_client_secret: ""

global:
  api_rate_limit: 18000
  web_rate_limit: 10000

channel:
  update_frequency: 0
  test_frequency: 0

connect_timeout: 5
relay_timeout: 0
