# Local direct-access template
# Suitable for:
# - single-machine testing
# - no reverse proxy
# - direct browser / API access to Tokilake

port: 3000
gin_mode: "debug"
log_level: "debug"
log_dir: "./logs"

# No reverse proxy in front of Tokilake.
# "none" means "trust no proxy headers", not "trust everyone".
trusted_header: ""
trusted_proxies: "none"
proxy_protocol_enabled: false

# Local direct access address.
server_address: "http://127.0.0.1:3000"

# Fill these with your own values before using.
session_secret: "replace-with-a-random-session-secret"
user_token_secret: "replace-with-at-least-32-random-characters"
hashids_salt: "replace-with-a-stable-random-salt"

# Local defaults: keep setup simple.
sqlite_path: "one-api.db"
redis_conn_string: ""

# Recommended local auth defaults. Adjust if needed.
register_enabled: true
password_login_enabled: true
password_register_enabled: true
github_oauth_enabled: false
google_oauth_enabled: false
google_only_register_enabled: false
wechat_auth_enabled: false
lark_auth_enabled: false
oidc_auth_enabled: false
webauthn_auth_enabled: false

global:
  api_rate_limit: 1800
  web_rate_limit: 600

channel:
  update_frequency: 0
  test_frequency: 0

connect_timeout: 5
relay_timeout: 0
